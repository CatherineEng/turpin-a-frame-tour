<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Turpin Walkthrough I</title>
  <style>
	html, body { margin: 0; height: 100%; overflow: hidden; }
	#info { position: absolute; top: 12px; left: 12px; padding: 8px 10px; background: rgba(0,0,0,.5); color: white; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="info">Click to lock mouse. WASD to move.</div>
  <!--img src="exhibits/landscape/7b59a6b3-8ec7-4260-aedc-1f4957d1c67b.jpg" alt="land" style="width:100%;height:auto;" /-->
  
  <script type="importmap">
  {
	"imports": {
	  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
	  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
	}
  }
  </script>
  <script type="module">
  console.log("Three.js script running ✅");

  import * as THREE from "three";
  import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
  import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

	const scene = new THREE.Scene();
	scene.background = new THREE.Color(0x222222);

	const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);
	camera.position.set(0, 1.6, 5);

	const renderer = new THREE.WebGLRenderer({ antialias: true });
	renderer.setSize(innerWidth, innerHeight);
	document.body.appendChild(renderer.domElement);

	// Lights
	scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
	const dir = new THREE.DirectionalLight(0xffffff, 0.8);
	dir.position.set(5, 10, 7);
	scene.add(dir);

	// Controls (mouse-look + WASD)
	const controls = new PointerLockControls(camera, document.body);
	document.addEventListener("click", () => controls.lock());

	const keys = { w:false, a:false, s:false, d:false };
	document.addEventListener("keydown", (e) => { if (keys[e.key.toLowerCase()] !== undefined) keys[e.key.toLowerCase()] = true; });
	document.addEventListener("keyup",   (e) => { if (keys[e.key.toLowerCase()] !== undefined) keys[e.key.toLowerCase()] = false; });

	// Load your village GLB
	const loader = new GLTFLoader();
	loader.load("./exhibits/landscape/scene.glb", (gltf) => {
	  scene.add(gltf.scene);
	});

	const clock = new THREE.Clock();
	const speed = 3.0; // meters/sec

	function animate() {
	  requestAnimationFrame(animate);
	  const dt = clock.getDelta();

	  // Move forward/back/strafe in the camera's local frame
	  if (controls.isLocked) {
		const forward = new THREE.Vector3();
		camera.getWorldDirection(forward);
		forward.y = 0; forward.normalize();

		const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

		const move = new THREE.Vector3();
		if (keys.w) move.add(forward);
		if (keys.s) move.sub(forward);
		if (keys.d) move.add(right);
		if (keys.a) move.sub(right);

		if (move.lengthSq() > 0) {
		  move.normalize().multiplyScalar(speed * dt);
		  camera.position.add(move);
		}
	  }

	  renderer.render(scene, camera);
	}
	animate();

	addEventListener("resize", () => {
	  camera.aspect = innerWidth / innerHeight;
	  camera.updateProjectionMatrix();
	  renderer.setSize(innerWidth, innerHeight);
	});
  </script>
</body>
</html>
