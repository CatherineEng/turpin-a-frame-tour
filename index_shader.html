<script>
	window.addEventListener("DOMContentLoaded", () => {
	  const overlay = document.getElementById("loadingOverlay");
	  const enterBtn = document.getElementById("enterBtn");
	  const progressText = document.getElementById("progressText");
	
	  const modelEl = document.querySelector("#mainVillageModel");
	  const assetsEl = document.querySelector("a-assets");
	
	  let modelReady = false;
	  let userEntered = false;
	
	  function updateEnterState() {
		enterBtn.disabled = !modelReady;
	  }
	
	  function fadeOutOverlay() {
		overlay.classList.add("hidden");
		setTimeout(() => overlay.remove(), 600);
	  }
	
	  async function unlockAudio() {
		try {
		  const ctx = AFRAME && AFRAME.audioContext;
		  if (ctx && ctx.state === "suspended") await ctx.resume();
		} catch (e) {}
	  }
	
	  // Progress from <a-assets> (works best once GLB is in a-assets)
	  if (assetsEl) {
		assetsEl.addEventListener("progress", (e) => {
		  const loaded = e?.detail?.loaded;
		  const total = e?.detail?.total;
		  if (loaded && total) {
			const pct = Math.min(100, Math.round((loaded / total) * 100));
			progressText.textContent = `Loading… ${pct}%`;
		  } else {
			// total may be missing; show "Loading…" without lying
			progressText.textContent = `Loading…`;
		  }
		});
	  }
	
	  if (modelEl) {
		modelEl.addEventListener("model-loaded", () => {
		  modelReady = true;
		  progressText.textContent = "Loaded. Click Enter.";
		  updateEnterState();
		  if (userEntered) fadeOutOverlay();
		});
	
		modelEl.addEventListener("model-error", () => {
		  modelReady = true;
		  progressText.textContent = "Load error. Click Enter to continue.";
		  updateEnterState();
		});
	  } else {
		modelReady = true;
		progressText.textContent = "Ready. Click Enter.";
		updateEnterState();
	  }
	
	  enterBtn.addEventListener("click", async () => {
		userEntered = true;
		await unlockAudio();          // this is the key unlock
		if (modelReady) fadeOutOverlay();
	  });
	});
	</script>

<script>
  // Simple time-of-day cycle: dawn -> noon -> dusk -> night -> repeat
  window.addEventListener("DOMContentLoaded", () => {
	const scene = document.querySelector("a-scene");
	const sky = document.querySelector("#sky");
	const sun = document.querySelector("#sun");
	const ambient = document.querySelector("#ambient");

	// Define keyframes (minutes are arbitrary; you can speed up/slow down)
	const keyframes = [
	  { t: 0.00, sky: "#f6c7a1", fog: "#f6c7a1", sunI: 0.6, ambI: 0.35, sunPos: "3 6 -2" }, // dawn
	  { t: 0.25, sky: "#9fc9e8", fog: "#9fc9e8", sunI: 0.95, ambI: 0.6, sunPos: "5 10 7" }, // noon
	  { t: 0.55, sky: "#f2b38b", fog: "#f2b38b", sunI: 0.7, ambI: 0.45, sunPos: "-2 6 3" }, // dusk
	  { t: 0.80, sky: "#081428", fog: "#081428", sunI: 0.15, ambI: 0.2, sunPos: "0 2 0" }, // night
	  { t: 1.00, sky: "#f6c7a1", fog: "#f6c7a1", sunI: 0.6, ambI: 0.35, sunPos: "3 6 -2" }  // loop
	];

	const cycleSeconds = 120; // change this: 120 = 2 minutes per full day cycle

	function lerp(a, b, t) { return a + (b - a) * t; }
	function hexToRgb(h){
	  const x = h.replace("#",""); 
	  return { r: parseInt(x.slice(0,2),16), g: parseInt(x.slice(2,4),16), b: parseInt(x.slice(4,6),16) };
	}
	function rgbToHex(r,g,b){
	  const toHex = (v)=>("0"+Math.round(v).toString(16)).slice(-2);
	  return "#"+toHex(r)+toHex(g)+toHex(b);
	}
	function mixHex(a,b,t){
	  const A=hexToRgb(a), B=hexToRgb(b);
	  return rgbToHex(lerp(A.r,B.r,t), lerp(A.g,B.g,t), lerp(A.b,B.b,t));
	}
	function mixPos(a,b,t){
	  const pa=a.split(" ").map(Number), pb=b.split(" ").map(Number);
	  return `${lerp(pa[0],pb[0],t)} ${lerp(pa[1],pb[1],t)} ${lerp(pa[2],pb[2],t)}`;
	}

	function sample(p){
	  // find surrounding keyframes
	  for(let i=0;i<keyframes.length-1;i++){
		const k1=keyframes[i], k2=keyframes[i+1];
		if(p>=k1.t && p<=k2.t){
		  const tt=(p-k1.t)/(k2.t-k1.t);
		  return {
			sky: mixHex(k1.sky,k2.sky,tt),
			fog: mixHex(k1.fog,k2.fog,tt),
			sunI: lerp(k1.sunI,k2.sunI,tt),
			ambI: lerp(k1.ambI,k2.ambI,tt),
			sunPos: mixPos(k1.sunPos,k2.sunPos,tt)
		  };
		}
	  }
	  return keyframes[0];
	}

	function tick(){
	  const now = performance.now() / 1000;
	  const p = (now % cycleSeconds) / cycleSeconds;
	  const s = sample(p);

	  if (sky) sky.setAttribute("color", s.sky);
	  if (scene) scene.setAttribute("fog", `type: exponential; color: ${s.fog}; density: 0.003`);
	  if (sun) {
		sun.setAttribute("intensity", s.sunI);
		sun.setAttribute("position", s.sunPos);
	  }
	  if (ambient) ambient.setAttribute("intensity", s.ambI);

	  requestAnimationFrame(tick);
	}
	tick();
  });
</script>
